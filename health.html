<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统健康状态</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen bg-fb-bg p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">
                系统健康状态
            </h1>
            <p class="text-fb-gray text-sm md:text-base">服务运行状态监控</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 md:p-8">
            <div id="health-content" class="space-y-4">
                <div class="flex items-center justify-center py-8">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-fb-blue"></div>
                    <span class="ml-3 text-fb-gray">正在检查系统状态...</span>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center">
            <button
                onclick="checkHealth()"
                class="bg-fb-blue hover:bg-fb-blue-dark text-white font-semibold py-2 px-6 rounded-lg transition-colors"
            >
                刷新状态
            </button>
            <p class="text-fb-gray text-xs mt-4">
                自动刷新: <span id="auto-refresh-status" onclick="toggleAutoRefresh()" class="cursor-pointer text-fb-blue hover:underline">已关闭</span>
            </p>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function checkHealth() {
            const content = document.getElementById('health-content');
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const apiReachable = true;
                const isOk = data.status === 'ok';
                const dbConnected = data.services?.database === 'connected';
                const overallStatusText = isOk ? '运行中' : '降级';
                const overallStatusClass = isOk ? 'text-green-600' : 'text-orange-600';
                const overallDotClass = isOk ? 'bg-green-500' : 'bg-orange-500';
                const errorDetail = data.error
                    ? `
                        <div class="p-4 bg-orange-50 rounded-lg border border-orange-200">
                            <p class="text-orange-700 text-sm">错误详情: ${escapeHtml(data.error)}</p>
                        </div>
                    `
                    : '';
                
                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full ${apiReachable ? 'bg-green-500' : 'bg-red-500'} mr-3"></div>
                                <span class="font-medium text-gray-700">API：</span>
                            </div>
                            <span class="${apiReachable ? 'text-green-600' : 'text-red-600'} font-semibold">
                                ${apiReachable ? '可访问' : '不可访问'}
                            </span>
                        </div>

                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full ${overallDotClass} mr-3"></div>
                                <span class="font-medium text-gray-700">整体状态：</span>
                            </div>
                            <span class="${overallStatusClass} font-semibold">
                                ${overallStatusText}
                            </span>
                        </div>
                        
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full ${dbConnected ? 'bg-green-500' : 'bg-red-500'} mr-3"></div>
                                <span class="font-medium text-gray-700">数据库：</span>
                            </div>
                            <span class="${dbConnected ? 'text-green-600' : 'text-red-600'} font-semibold">
                                ${dbConnected ? '已连接' : '连接失败'}
                            </span>
                        </div>
                        
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <span class="font-medium text-gray-700">检查时间：</span>
                            <span class="text-fb-gray">${formatTimestamp(data.timestamp)}</span>
                        </div>
                        
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <span class="font-medium text-gray-700">响应状态：</span>
                            <span class="text-fb-gray">${response.status} ${response.statusText}</span>
                        </div>

                        ${errorDetail}
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-red-50 rounded-lg border border-red-200">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full bg-red-500 mr-3"></div>
                                <span class="font-medium text-gray-700">API：</span>
                            </div>
                            <span class="text-red-600 font-semibold">无法访问</span>
                        </div>

                        <div class="flex items-center justify-between p-4 bg-red-50 rounded-lg border border-red-200">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full bg-red-500 mr-3"></div>
                                <span class="font-medium text-gray-700">整体状态：</span>
                            </div>
                            <span class="text-red-600 font-semibold">未知</span>
                        </div>
                        
                        <div class="flex items-center justify-between p-4 bg-red-50 rounded-lg border border-red-200">
                            <div class="flex items-center">
                                <div class="w-3 h-3 rounded-full bg-red-500 mr-3"></div>
                                <span class="font-medium text-gray-700">数据库：</span>
                            </div>
                            <span class="text-red-600 font-semibold">未知</span>
                        </div>
                        
                        <div class="p-4 bg-red-50 rounded-lg border border-red-200">
                            <p class="text-red-600 text-sm">错误: ${escapeHtml(error.message)}</p>
                        </div>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            });
        }

        function toggleAutoRefresh() {
            const statusEl = document.getElementById('auto-refresh-status');
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                statusEl.textContent = '已关闭';
            } else {
                autoRefreshInterval = setInterval(checkHealth, 30000);
                statusEl.textContent = '每30秒';
            }
        }

        checkHealth();
    </script>
</body>
</html>
