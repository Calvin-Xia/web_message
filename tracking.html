<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追踪进度</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --ink: #172033;
      --ink-soft: #4c566b;
      --line: rgba(23, 32, 51, 0.12);
      --accent: #2457d6;
      --shadow: 0 24px 70px rgba(18, 26, 44, 0.12);
      --panel-blur: 20px;
    }

    .timeline-item {
      position: relative;
      padding-left: 3rem;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 0.9rem;
      top: 1.6rem;
      bottom: -1.6rem;
      width: 1px;
      background: rgba(23, 32, 51, 0.12);
    }

    .timeline-item:last-child::before {
      display: none;
    }

    .timeline-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-weight: 700;
      position: absolute;
      left: 0;
      top: 0.1rem;
      width: 1.8rem;
      height: 1.8rem;
      background: rgba(36, 87, 214, 0.12);
      color: #2147ac;
      font-size: 0.85rem;
    }

    .tracking-card {
      border: 1px solid rgba(23, 32, 51, 0.08);
      background: rgba(255, 255, 255, 0.72);
    }
  </style>
</head>
<body data-page-role="tracking" class="min-h-screen px-4 py-5 md:px-8 md:py-8">
  <a class="skip-link" href="#mainContent">跳到主要内容</a>
  <header class="mx-auto flex max-w-5xl flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <div class="text-xs font-semibold uppercase tracking-[0.35em] text-[#5f6b80]">Tracking Desk</div>
      <h1 class="display-font mt-2 text-3xl md:text-4xl">追踪进度</h1>
      <p class="mt-3 max-w-2xl text-sm leading-7 text-[#4c566b]">输入追踪编号，查看状态、摘要和公开回复。</p>
    </div>
    <nav class="flex flex-wrap gap-2 text-sm text-[#445069]">
      <a class="ghost-button rounded-full px-4 py-2 transition" href="/">返回首页</a>
      <a class="ghost-button rounded-full px-4 py-2 transition" href="/?page=1&sortField=updatedAt&sortOrder=desc#publicFeed">查看公开同步</a>
    </nav>
  </header>

  <main id="mainContent" class="mx-auto mt-6 max-w-5xl space-y-6 md:mt-8">
    <section class="hero-slab rounded-[2rem] p-6 md:p-8">
      <div class="grid gap-6 md:grid-cols-[1.08fr_0.92fr] md:items-center">
        <div>
          <div class="inline-flex items-center rounded-full bg-[rgba(36,87,214,0.1)] px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[#2147ac]">Private Lookup</div>
          <h2 class="display-font mt-4 text-3xl leading-tight md:text-4xl">凭追踪编号，查看当前状态与公开回执。</h2>
          <p class="mt-4 text-sm leading-7 text-[#4c566b] md:text-base">编号通常为 8 位大写字符。</p>
          <div class="mt-5 flex flex-wrap gap-2 text-xs font-semibold uppercase tracking-[0.22em] text-[#72809a]">
            <span class="rounded-full bg-white/65 px-3 py-2">状态</span>
            <span class="rounded-full bg-white/65 px-3 py-2">摘要</span>
            <span class="rounded-full bg-white/65 px-3 py-2">时间线</span>
          </div>
        </div>
        <form id="trackingForm" class="surface-panel space-y-4 rounded-[1.8rem] p-5" novalidate>
          <label class="space-y-2 text-sm font-medium text-[#25314a]">
            <span>追踪编号 <span class="required-mark" aria-hidden="true">*</span></span>
            <input id="trackingCode" name="trackingCode" class="field-shell h-16 w-full rounded-2xl px-4 text-base font-semibold tracking-[0.18em] uppercase" placeholder="例如 ABCD23EF" required aria-describedby="trackingCodeHelp trackingCodeValidationMessage" autocomplete="off" autocapitalize="characters" spellcheck="false">
            <span id="trackingCodeValidationMessage" class="field-error" hidden aria-live="polite"></span>
          </label>
          <button id="queryButton" type="submit" class="primary-button inline-flex h-12 w-full items-center justify-center rounded-full px-5 text-sm font-semibold transition disabled:cursor-not-allowed disabled:opacity-60">查询处理进度</button>
          <div id="trackingNotification" aria-live="polite" aria-atomic="true"></div>
          <div id="trackingCodeHelp" class="rounded-[1.2rem] border border-dashed border-[rgba(23,32,51,0.16)] bg-white/60 px-4 py-3 text-xs leading-6 text-[#5f6b80]">
            追踪编号通常为 8 位大写字符，也可从提交成功页直接进入本页。
          </div>
        </form>
      </div>
    </section>

    <section id="resultPanel" class="surface-panel rounded-[2rem] p-6 md:p-8" tabindex="-1">
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.3em] text-[#72809a]">Lookup Result</div>
        <h3 class="display-font mt-2 text-3xl">查询结果</h3>
      </div>
      <div id="resultState" class="feedback-box feedback-box--loading mt-5 text-center" aria-live="polite" aria-busy="false">
        输入追踪编号后，这里会展示当前状态、公开摘要和时间线。
      </div>
    </section>
  </main>

  <footer class="mx-auto mt-10 max-w-5xl border-t border-[rgba(23,32,51,0.08)] pt-6 text-right text-sm text-[#6b7488]">
    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" class="transition hover:text-[#172033]">渝ICP备2026000319号</a>
    <br>
    <a href="https://beian.mps.gov.cn/#/query/webSearch?code=50010102001439" rel="noreferrer" target="_blank" class="mt-2 inline-flex items-center gap-2 transition hover:text-[#172033]">
      <img src="/storage/Beian.png" alt="公安备案" class="h-5 w-5">
      渝公网安备50010102001439号
    </a>
  </footer>

  <script type="module">
    import { TRACKING_CODE_PATTERN } from './src/shared/constants.js';
    import { distressTypeLabels, sceneTagLabels } from './src/shared/labels.js';

    const API_BASE = '/api';
    const REQUEST_TIMEOUT = 12000;
    const statusLabels = {
      submitted: '已提交',
      in_review: '审核中',
      in_progress: '处理中',
      resolved: '已解决',
      closed: '已关闭',
    };
    const categoryLabels = {
      academic: '学业相关',
      facility: '设施问题',
      service: '服务咨询',
      complaint: '投诉建议',
      counseling: '心理咨询',
      other: '其他',
    };
    const priorityLabels = {
      low: '低',
      normal: '普通',
      high: '高',
      urgent: '紧急',
    };

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    function renderFeedbackBox(message, type = 'info') {
      const tone = {
        success: 'feedback-box--success',
        error: 'feedback-box--error',
        info: 'feedback-box--info',
        loading: 'feedback-box--loading',
      };
      const role = type === 'error' ? 'alert' : 'status';
      const content = type === 'loading'
        ? `<span class="loading-dots">${escapeHtml(message)}</span>`
        : escapeHtml(message);
      return `<div class="feedback-box ${tone[type] || tone.info}" role="${role}">${content}</div>`;
    }

    function setButtonBusy(button, busy, loadingText, idleText = button.dataset.originalText || button.textContent.trim()) {
      if (!(button instanceof HTMLElement)) {
        return;
      }

      if (busy) {
        const width = Math.ceil(button.getBoundingClientRect().width);
        if (width > 0) {
          button.style.width = `${width}px`;
        }
        button.dataset.originalText = idleText;
        button.disabled = true;
        button.classList.add('button-busy');
        button.setAttribute('aria-busy', 'true');
        button.textContent = loadingText;
        return;
      }

      button.disabled = false;
      button.classList.remove('button-busy');
      button.removeAttribute('aria-busy');
      button.style.width = '';
      button.textContent = idleText;
    }

    function setTrackingNotification(message = '', type = 'info') {
      document.getElementById('trackingNotification').innerHTML = message ? renderFeedbackBox(message, type) : '';
    }

    function setTrackingCodeError(message = '') {
      const input = document.getElementById('trackingCode');
      const messageNode = document.getElementById('trackingCodeValidationMessage');
      if (message) {
        input.setAttribute('aria-invalid', 'true');
        messageNode.textContent = message;
        messageNode.hidden = false;
        return;
      }

      input.removeAttribute('aria-invalid');
      messageNode.textContent = '';
      messageNode.hidden = true;
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }

      return new Date(value).toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });
    }

    async function fetchWithTimeout(url, options = {}, timeout = REQUEST_TIMEOUT) {
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, {
          cache: 'no-store',
          ...options,
          signal: controller.signal,
        });
      } finally {
        clearTimeout(timer);
      }
    }

    function buildTimeline(data) {
      const baseEvent = {
        type: 'status_change',
        newValue: 'submitted',
        isPublic: false,
        createdAt: data.createdAt,
      };
      return [baseEvent, ...(data.updates || [])];
    }

    function getPublicReplies(data) {
      return (data.updates || [])
        .filter((item) => item.type === 'public_reply')
        .slice()
        .sort((left, right) => Date.parse(right.createdAt || 0) - Date.parse(left.createdAt || 0));
    }

    function renderTrackingBanner(data) {
      return `
        <div class="result-banner text-left">
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.28em] text-[#72809a]">Current Snapshot</div>
            <div class="flex flex-wrap items-center gap-2">
              <span class="status-token" data-status="${escapeHtml(data.status)}">${escapeHtml(statusLabels[data.status] || data.status)}</span>
              <span class="rounded-full bg-[rgba(23,32,51,0.08)] px-3 py-1 text-xs font-semibold text-[#4c566b]">${escapeHtml(categoryLabels[data.category] || data.category)}</span>
              ${data.category === 'counseling' && data.distressType ? `<span class="rounded-full bg-[rgba(217,138,23,0.12)] px-3 py-1 text-xs font-semibold text-[#8b5a12]">${escapeHtml(distressTypeLabels[data.distressType] || data.distressType)}</span>` : ''}
              ${data.category === 'counseling' && data.sceneTag ? `<span class="rounded-full bg-[rgba(19,121,91,0.12)] px-3 py-1 text-xs font-semibold text-[#13795b]">${escapeHtml(sceneTagLabels[data.sceneTag] || data.sceneTag)}</span>` : ''}
              <span class="rounded-full bg-[rgba(36,87,214,0.1)] px-3 py-1 text-xs font-semibold text-[#2147ac]">优先级 ${escapeHtml(priorityLabels[data.priority] || data.priority)}</span>
            </div>
          </div>
          <div class="result-meta-card text-center md:text-right">
            <div class="text-xs font-semibold uppercase tracking-[0.3em] text-[#72809a]">Tracking Code</div>
            <div class="mt-2 text-2xl font-black tracking-[0.22em] text-[#172033]">${escapeHtml(data.trackingCode)}</div>
            <div class="mt-2 text-sm leading-6 text-[#4c566b]">最近更新 ${escapeHtml(formatDate(data.updatedAt))}</div>
          </div>
        </div>
      `;
    }

    function renderPublicReplyList(publicReplies) {
      if (publicReplies.length === 0) {
        return '<div class="rounded-[1.2rem] border border-dashed border-[rgba(23,32,51,0.14)] bg-white/60 px-4 py-3 text-sm leading-6 text-[#5f6b80]">暂时还没有公开回复，可先查看右侧时间线了解状态变化。</div>';
      }

      return publicReplies.map((item) => `
        <article class="rounded-[1.2rem] border border-[rgba(23,32,51,0.08)] bg-[rgba(248,243,234,0.78)] px-4 py-3">
          <div class="text-xs font-semibold uppercase tracking-[0.24em] text-[#72809a]">${escapeHtml(formatDate(item.createdAt))}</div>
          <div class="mt-2 text-sm leading-7 text-[#172033]">${escapeHtml(item.content || '暂无内容')}</div>
        </article>
      `).join('');
    }

    function renderTrackingOverview(data, publicReplies) {
      return `
        <section class="result-panel-card text-left">
          <div class="text-xs font-semibold uppercase tracking-[0.3em] text-[#72809a]">Issue Overview</div>
          <div class="mt-3 text-lg leading-8 text-[#172033]">${escapeHtml(data.content)}</div>
          <div class="mt-4 flex flex-wrap gap-x-5 gap-y-2 text-sm leading-6 text-[#4c566b]">
            <span><strong class="text-[#172033]">提交：</strong>${escapeHtml(formatDate(data.createdAt))}</span>
            <span><strong class="text-[#172033]">更新：</strong>${escapeHtml(formatDate(data.updatedAt))}</span>
            <span><strong class="text-[#172033]">公开回复：</strong>${publicReplies.length > 0 ? `已同步 ${publicReplies.length} 条` : '暂无'}</span>
            ${data.category === 'counseling' && data.distressType ? `<span><strong class="text-[#172033]">困扰类别：</strong>${escapeHtml(distressTypeLabels[data.distressType] || data.distressType)}</span>` : ''}
            ${data.category === 'counseling' && data.sceneTag ? `<span><strong class="text-[#172033]">主要场景：</strong>${escapeHtml(sceneTagLabels[data.sceneTag] || data.sceneTag)}</span>` : ''}
          </div>
          <div class="mt-5 rounded-[1.4rem] border border-[rgba(23,32,51,0.08)] bg-[rgba(36,87,214,0.05)] p-4 text-sm leading-7 text-[#445069]">
            <div class="text-xs font-semibold uppercase tracking-[0.28em] text-[#72809a]">公开摘要</div>
            <div class="mt-2">${escapeHtml(data.publicSummary || '后台尚未填写公开摘要。')}</div>
          </div>
          <div class="mt-5 rounded-[1.4rem] border border-[rgba(23,32,51,0.08)] bg-white/72 p-4 text-sm leading-7 text-[#445069]">
            <div class="flex flex-wrap items-center justify-between gap-2">
              <div class="text-xs font-semibold uppercase tracking-[0.28em] text-[#72809a]">公开回复汇总</div>
              <div class="text-xs text-[#72809a]">${publicReplies.length > 0 ? `共 ${publicReplies.length} 条` : '暂无公开回复'}</div>
            </div>
            <div class="mt-3 space-y-3">${renderPublicReplyList(publicReplies)}</div>
          </div>
        </section>
      `;
    }

    function renderTimelineItems(timeline) {
      return timeline.map((item) => `
        <article class="timeline-item">
          <div class="timeline-dot">${item.type === 'public_reply' ? '答' : '更'}</div>
          <div class="rounded-[1.3rem] border border-[rgba(23,32,51,0.08)] bg-white/70 p-4">
            <div class="flex flex-wrap items-center gap-2">
              <span class="text-sm font-semibold text-[#172033]">${item.type === 'public_reply' ? '公开回复' : `状态更新为 ${escapeHtml(statusLabels[item.newValue] || item.newValue || '已更新')}`}</span>
              <span class="text-xs uppercase tracking-[0.24em] text-[#72809a]">${escapeHtml(formatDate(item.createdAt))}</span>
            </div>
            <div class="mt-2 text-sm leading-7 text-[#4c566b]">${item.type === 'public_reply' ? escapeHtml(item.content || '暂无内容') : '处理状态已更新，可持续关注后续动作。'}</div>
          </div>
        </article>
      `).join('');
    }

    function renderTrackingTimeline(timeline) {
      return `
        <section class="result-panel-card text-left">
          <div class="text-xs font-semibold uppercase tracking-[0.3em] text-[#72809a]">Timeline</div>
          <h3 class="display-font mt-2 text-2xl">处理时间线</h3>
          <div class="mt-5 space-y-6">${renderTimelineItems(timeline)}</div>
        </section>
      `;
    }

    function renderTrackingResult(data) {
      const timeline = buildTimeline(data);
      const publicReplies = getPublicReplies(data);

      return `
        ${renderTrackingBanner(data)}
        <div class="result-grid mt-5">
          ${renderTrackingOverview(data, publicReplies)}
          ${renderTrackingTimeline(timeline)}
        </div>
      `;
    }

    function renderResult(data) {
      document.getElementById('resultState').setAttribute('aria-busy', 'false');
      setTrackingCodeError();
      document.getElementById('resultState').innerHTML = renderTrackingResult(data);
      document.getElementById('resultPanel').focus({ preventScroll: true });
      setTrackingNotification('查询成功，已更新处理状态与时间线。', 'success');
    }

    function renderError(message) {
      document.getElementById('resultState').setAttribute('aria-busy', 'false');
      document.getElementById('resultState').innerHTML = `
        ${renderFeedbackBox(message, 'error')}
        <button class="ghost-button mt-4 px-4 py-2 text-sm font-semibold" type="button" data-retry-lookup>重新输入</button>
      `;
      document.querySelector('[data-retry-lookup]')?.addEventListener('click', () => {
        document.getElementById('trackingCode').focus();
      });
      document.getElementById('resultPanel').focus({ preventScroll: true });
      setTrackingNotification(message, 'error');
    }

    async function loadTracking(code) {
      const resultState = document.getElementById('resultState');
      resultState.setAttribute('aria-busy', 'true');
      resultState.innerHTML = renderFeedbackBox('正在查询追踪记录', 'loading');
      setTrackingNotification('正在校验并查询追踪编号...', 'info');

      try {
        const response = await fetchWithTimeout(`${API_BASE}/issues/${encodeURIComponent(code.trim().toUpperCase())}`);
        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.error || '查询失败');
        }

        renderResult(result.data);
      } catch (error) {
        const message = error.name === 'AbortError' ? '请求超时，请稍后重试' : error.message;
        renderError(message);
      }
    }

    document.getElementById('trackingForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const code = document.getElementById('trackingCode').value.trim().toUpperCase();
      document.getElementById('trackingCode').value = code;
      setTrackingCodeError();
      if (!TRACKING_CODE_PATTERN.test(code)) {
        setTrackingCodeError('请输入 8 位大写字母或数字。');
        setTrackingNotification('追踪编号格式无效。', 'error');
        document.getElementById('trackingCode').focus();
        return;
      }

      document.getElementById('queryButton').disabled = true;
      setButtonBusy(document.getElementById('queryButton'), true, '查询中...');
      try {
        await loadTracking(code);
      } finally {
        setButtonBusy(document.getElementById('queryButton'), false, '', '查询处理进度');
      }
    });

    const presetCode = new URLSearchParams(window.location.search).get('code');
    if (presetCode) {
      const normalizedPresetCode = presetCode.toUpperCase();
      document.getElementById('trackingCode').value = normalizedPresetCode;
      if (TRACKING_CODE_PATTERN.test(normalizedPresetCode)) {
        loadTracking(normalizedPresetCode);
      } else {
        setTrackingCodeError('链接中的追踪编号格式无效。');
        setTrackingNotification('链接中的追踪编号格式无效。', 'error');
        document.getElementById('trackingCode').focus();
      }
    }
    document.getElementById('trackingCode').addEventListener('input', () => setTrackingCodeError());
  </script>
</body>
</html>
